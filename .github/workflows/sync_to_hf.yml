name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Git LFS
        run: git lfs install

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"

          # Add Remote with safe URL masking
          git remote add hf https://AmosQuety:$HF_TOKEN@huggingface.co/spaces/AmosQuety/biometric-brain

          echo "🚀 Syncing to Hugging Face Space..."
          
          # Force push to ensure the Space matches the main branch exactly
          git push --force hf main
          
          echo "✅ Successfully synced to Hugging Face Space."